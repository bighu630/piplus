name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build-linux:
    name: 'Linux (amd64)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 icnsutils graphicsmagick rpm

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-amd64
          path: |
            apps/desktop/dist/piplus-*-linux-amd64.*

  build-windows:
    name: 'Windows (amd64)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh win

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-amd64
          path: |
            apps/desktop/dist/piplus-*-win-amd64.*

  build-mac-amd64:
    name: 'macOS (amd64)'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh mac x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-amd64
          path: |
            apps/desktop/dist/piplus-*-mac-amd64.*

  build-mac-arm64:
    name: 'macOS (arm64)'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh mac arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-arm64
          path: |
            apps/desktop/dist/piplus-*-mac-arm64.*

  docker:
    name: 'Docker Image'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            iambighu/piplus:latest
            iambighu/piplus:${{ env.VERSION }}
          build-args: |
            APP_VERSION=${{ env.VERSION }}

  release:
    name: Create Release
    needs:
      - build-linux
      - build-windows
      - build-mac-amd64
      - build-mac-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6

      - name: Generate release notes
        run: python3 scripts/generate-release-notes.py "${{ github.ref_name }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            linux-amd64/*.AppImage
            linux-amd64/*.deb
            linux-amd64/*.rpm
            windows-amd64/*.exe
            mac-amd64/*.dmg
            mac-arm64/*.dmg
          draft: true
          prerelease: false
