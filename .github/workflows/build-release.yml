name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build-linux:
    name: 'Linux (amd64)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 icnsutils graphicsmagick rpm

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm

  build-windows:
    name: 'Windows (amd64)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            apps/desktop/dist/*.exe

  build-mac-amd64:
    name: 'macOS (amd64)'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh mac x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-amd64
          path: |
            apps/desktop/dist/*.dmg

  build-mac-arm64:
    name: 'macOS (arm64)'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build & Package
        run: bash scripts/build-desktop.sh mac arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            apps/desktop/dist/*.dmg

  release:
    name: Create Release
    needs:
      - build-linux
      - build-windows
      - build-mac-amd64
      - build-mac-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        run: |
          python3 -c "
import subprocess, sys, os
from datetime import date

tag = '${{ github.ref_name }}'
prev_tag = subprocess.run(
    ['git', 'tag', '--sort=-creatordate'],
    capture_output=True, text=True)
tags = [t for t in prev_tag.stdout.strip().split(chr(10)) if t.startswith('v')]
prev = tags[1] if len(tags) > 1 else None

lines = []
lines.append(f'# piplus {tag}')
lines.append('')
lines.append(f'> 发布日期: {date.today().isoformat()}')
lines.append('')
lines.append('---')

categories = {
    'feat': ('✨', '新功能'),
    'fix': ('🐛', '问题修复'),
    'refactor': ('🔧', '重构'),
    'docs': ('📝', '文档'),
    'style': ('🎨', '样式'),
    'chore': ('🛠', '工程与配置'),
    'ci': ('🤖', 'CI/CD'),
}

if prev:
    log = subprocess.run(
        ['git', 'log', '--no-decorate', '--format=%s', f'{prev}..{tag}'],
        capture_output=True, text=True).stdout.strip()

    uncategorized = []
    for prefix, (emoji, title) in categories.items():
        items = []
        for msg in log.split(chr(10)):
            # Match commit messages starting with prefix, e.g. 'feat:', 'fix(core):'
            import re
            if re.match(rf'^{prefix}[(:]', msg, re.IGNORECASE):
                clean = re.sub(r'^[^(:]+[:(]\s*', '', msg)
                if not clean.endswith(')'):
                    clean = re.sub(r'\)$', '', clean)
                items.append(f'  - {clean}' if clean else f'  - {msg}')
            elif not re.match(r'^(feat|fix|refactor|docs|style|chore|ci)[(:]', msg, re.IGNORECASE):
                uncategorized.append(f'  - {msg}')

        if items:
            lines.append('')
            lines.append(f'## {emoji} {title}')
            lines.append('')
            lines.extend(items)

    if uncategorized:
        lines.append('')
        lines.append('## 📋 其他')
        lines.append('')
        lines.extend(uncategorized)

lines.append('')
lines.append('---')
lines.append('')
lines.append('## 📦 下载')
lines.append('')
lines.append('| 平台 | 文件 |')
lines.append('|------|------|')

import glob
for pattern, label in [
    ('linux-amd64/*.AppImage', 'Linux AppImage'),
    ('linux-amd64/*.deb', 'Linux deb'),
    ('linux-amd64/*.rpm', 'Linux rpm'),
    ('windows-amd64/*.exe', 'Windows'),
    ('mac-amd64/*.dmg', 'macOS Intel'),
    ('mac-arm64/*.dmg', 'macOS Apple Silicon'),
]:
    for f in sorted(glob.glob(pattern)):
        name = os.path.basename(f)
        lines.append(f'| {label} | \\`{name}\\` |')

with open('release-notes.md', 'w') as f:
    f.write(chr(10).join(lines))
print('release-notes.md generated')
"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: piplus ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            linux-amd64/**
            windows-amd64/**
            mac-amd64/**
            mac-arm64/**
          draft: true
          prerelease: false
