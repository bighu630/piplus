name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build-linux:
    name: 'Linux (amd64)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 icnsutils graphicsmagick rpm

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build API bundle
        run: cd apps/api && bun run build:bundle

      - name: Build web for desktop
        run: cd apps/web && bun run build:desktop

      - name: Build desktop main/preload
        run: cd apps/desktop && bun run build

      - name: Prepare bundled bun
        run: |
          mkdir -p apps/desktop/bun-bin
          cp "$(command -v bun)" apps/desktop/bun-bin/bun
          chmod +x apps/desktop/bun-bin/bun

      - name: Package
        run: cd apps/desktop && bunx electron-builder --linux -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm

  build-windows:
    name: 'Windows (amd64)'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build API bundle
        run: cd apps/api && bun run build:bundle
        shell: bash

      - name: Build web for desktop
        run: cd apps/web && bun run build:desktop
        shell: bash

      - name: Build desktop main/preload
        run: cd apps/desktop && bun run build
        shell: bash

      - name: Prepare bundled bun
        run: |
          mkdir -p apps/desktop/bun-bin
          bun_path=$(command -v bun)
          cp "$bun_path" apps/desktop/bun-bin/bun.exe
          chmod +x apps/desktop/bun-bin/bun.exe
        shell: bash

      - name: Package
        run: cd apps/desktop && bunx electron-builder --win -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            apps/desktop/dist/*.exe

  build-mac-amd64:
    name: 'macOS (amd64)'
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build API bundle
        run: cd apps/api && bun run build:bundle

      - name: Build web for desktop
        run: cd apps/web && bun run build:desktop

      - name: Build desktop main/preload
        run: cd apps/desktop && bun run build

      - name: Prepare bundled bun
        run: |
          mkdir -p apps/desktop/bun-bin
          cp "$(command -v bun)" apps/desktop/bun-bin/bun
          chmod +x apps/desktop/bun-bin/bun

      - name: Package (x64)
        run: cd apps/desktop && bunx electron-builder --mac --x64 -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-amd64
          path: |
            apps/desktop/dist/*.dmg

  build-mac-arm64:
    name: 'macOS (arm64)'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build API bundle
        run: cd apps/api && bun run build:bundle

      - name: Build web for desktop
        run: cd apps/web && bun run build:desktop

      - name: Build desktop main/preload
        run: cd apps/desktop && bun run build

      - name: Prepare bundled bun
        run: |
          mkdir -p apps/desktop/bun-bin
          cp "$(command -v bun)" apps/desktop/bun-bin/bun
          chmod +x apps/desktop/bun-bin/bun

      - name: Package (arm64)
        run: cd apps/desktop && bunx electron-builder --mac --arm64 -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            apps/desktop/dist/*.dmg

  release:
    name: Create Release
    needs:
      - build-linux
      - build-windows
      - build-mac-amd64
      - build-mac-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        run: |
          echo "# piplus ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "## 下载" >> release-notes.md
          echo "" >> release-notes.md
          echo "| 平台 | 文件 |" >> release-notes.md
          echo "|------|------|" >> release-notes.md
          for f in linux-amd64/*.AppImage; do
            echo "| Linux AppImage | \`$(basename "$f")\` |" >> release-notes.md
          done
          for f in linux-amd64/*.deb; do
            echo "| Linux deb | \`$(basename "$f")\` |" >> release-notes.md
          done
          for f in linux-amd64/*.rpm; do
            echo "| Linux rpm | \`$(basename "$f")\` |" >> release-notes.md
          done
          for f in windows-amd64/*.exe; do
            echo "| Windows | \`$(basename "$f")\` |" >> release-notes.md
          done
          for f in mac-amd64/*.dmg; do
            echo "| macOS Intel | \`$(basename "$f")\` |" >> release-notes.md
          done
          for f in mac-arm64/*.dmg; do
            echo "| macOS Apple Silicon | \`$(basename "$f")\` |" >> release-notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: piplus ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            linux-amd64/**
            windows-amd64/**
            mac-amd64/**
            mac-arm64/**
          draft: true
          prerelease: false
