appId: com.piplus.desktop
productName: piplus
executableName: piplus
files:
  - dist/main/**
  - dist/preload/**
  - package.json
  - "!node_modules/**"
extraResources:
  - from: assets
    to: assets
  - from: ../api/dist
    to: api-dist
  - from: ../web/dist
    to: web-dist
  - from: ../migrations
    to: migrations
  - from: bun-bin
    to: bun-bin
    filter:
      - "**"
linux:
  category: Development
  executableName: piplus
  syncDesktopName: true
  target:
    - AppImage
    - deb
  icon: assets/icon.png
mac:
  target:
    - dmg
  icon: assets/icon.png
  category: public.app-category.developer-tools
win:
  target: nsis
  icon: assets/icon.ico
