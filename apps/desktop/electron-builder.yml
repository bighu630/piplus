appId: com.piplus.desktop
productName: piplus
executableName: piplus
icon: assets/icon.png
files:
  - dist/main/**
  - dist/preload/**
  - package.json
  - "!node_modules/**"
extraResources:
  - from: assets
    to: assets
  - from: ../api/dist
    to: api-dist
  - from: ../web/dist
    to: web-dist
  - from: ../migrations
    to: migrations
  - from: bun-bin
    to: bun-bin
    filter:
      - "**"
linux:
  artifactName: piplus-${version}-linux-amd64.${ext}
  category: Development
  executableName: piplus
  syncDesktopName: true
  target:
    - AppImage
    - deb
    - rpm
mac:
  artifactName: piplus-${version}-mac-${arch}.${ext}
  target:
    - dmg
  category: public.app-category.developer-tools
win:
  artifactName: piplus-${version}-win-amd64.${ext}
  target: nsis
