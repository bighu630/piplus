services:
  piplus:
    image: piplus:0.2.4
    environment:
      HOME: /home/app
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: file:/home/app/.config/piplus/piplus.sqlite
      PUBLIC_WEB_ORIGIN: piplus.whosworld.fun
      PIPLUS_SERVE_WEB: "1"
      PIPLUS_WEB_DIST: /app/apps/web/dist
    ports:
      - "3008:3000"
    volumes:
      - /data/piplus_data/pi/agent:/home/app/.pi/agent
      - /data/piplus_data/piplus:/home/app/.config/piplus
