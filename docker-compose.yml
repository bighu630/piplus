services:
  piplus:
    image: piplus:0.2.5
    environment:
      HOME: /root
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: file:/root/.config/piplus/piplus.sqlite
      PUBLIC_WEB_ORIGIN: piplus.whosworld.fun
      # Alternatively, use CORS_ORIGINS for multiple origins (comma-separated):
      # CORS_ORIGINS: http://localhost:3002,https://piplus.whosworld.fun
      PIPLUS_SERVE_WEB: "1"
      PIPLUS_WEB_DIST: /app/apps/web/dist
    ports:
      - "3008:3000"
    volumes:
      - /data/piplus_data/pi/agent:/root/.pi/agent
      - /data/piplus_data/piplus:/root/.config/piplus
